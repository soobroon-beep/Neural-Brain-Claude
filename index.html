<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEURAL BRAIN">
<title>NEURAL BRAIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#070708;
  --gold:#FFD700;
  --crimson:#DC143C;
  --bone:#F5F0E8;
  --gray:#141416;
  --gray2:#1d1d20;
  --gray3:#2c2c30;
  --muted:#8a8a92;
  --accent:#FFD700;
  --accent-soft:rgba(255,215,0,.12);
  --glass:rgba(22,22,26,.66);
  --glass-brd:rgba(255,255,255,.08);
  --radius:18px;
  --shadow:0 10px 40px -12px rgba(0,0,0,.7);
  --ease:cubic-bezier(.22,1,.36,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--black);
  color:var(--bone);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overscroll-behavior:none;
  letter-spacing:.1px;
}
/* ambient field behind everything */
body::before{
  content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(900px 600px at 12% -8%, color-mix(in srgb,var(--accent) 14%, transparent), transparent 60%),
    radial-gradient(800px 700px at 100% 0%, rgba(220,20,60,.10), transparent 55%),
    radial-gradient(700px 700px at 50% 120%, color-mix(in srgb,var(--accent) 8%, transparent), transparent 60%),
    #070708;
  transition:background .6s var(--ease);
}
#neuralBg{position:fixed;inset:0;z-index:-1;width:100%;height:100%;pointer-events:none;opacity:.55}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
::selection{background:var(--accent);color:#000}

/* ---------- App shell ---------- */
#app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;position:relative}
.topbar{
  position:sticky;top:0;z-index:40;
  padding:calc(var(--safe-top) + 14px) 16px 12px;
  background:linear-gradient(180deg,rgba(7,7,8,.92),rgba(7,7,8,.55));
  backdrop-filter:blur(22px) saturate(140%);
  -webkit-backdrop-filter:blur(22px) saturate(140%);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.topbar::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--accent) 55%,transparent),transparent);opacity:.7}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:1.2px;font-size:14.5px;text-transform:uppercase}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent),0 0 4px var(--accent);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 14px var(--accent)}50%{opacity:.55;transform:scale(.7);box-shadow:0 0 6px var(--accent)}}
.brand b{background:linear-gradient(95deg,var(--bone),var(--accent) 55%,var(--bone));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 6s linear infinite}
@keyframes shine{to{background-position:200% center}}
.iconbtn{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;background:var(--glass);border:1px solid var(--glass-brd);font-size:17px;transition:.25s var(--ease);backdrop-filter:blur(8px)}
.iconbtn:active{transform:scale(.88);background:var(--gray2)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--gray2);display:grid;place-items:center;font-weight:800;color:var(--accent);overflow:hidden;border:1.5px solid var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent),0 4px 14px rgba(0,0,0,.5);transition:.25s var(--ease)}
.avatar:active{transform:scale(.9)}
.avatar img{width:100%;height:100%;object-fit:cover}

/* brain chips */
.brains-scroll{display:flex;gap:9px;overflow-x:auto;padding:14px 0 3px;scrollbar-width:none}
.brains-scroll::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:9px 15px;border-radius:30px;
  background:var(--glass);border:1px solid var(--glass-brd);font-size:13px;font-weight:600;
  color:var(--muted);transition:.3s var(--ease);white-space:nowrap;backdrop-filter:blur(8px);position:relative
}
.chip:active{transform:scale(.94)}
.chip .e{font-size:15px}
.chip.active{color:#000;border-color:transparent;font-weight:800;box-shadow:0 6px 22px -6px var(--accent),0 0 0 1px rgba(255,255,255,.15) inset}
.chip.add{color:var(--accent);font-weight:800;border-style:dashed;border-color:color-mix(in srgb,var(--accent) 40%,transparent)}

/* ---------- Main ---------- */
main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 120px;-webkit-overflow-scrolling:touch}
.screen{animation:fade .45s var(--ease)}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.section-title{font-size:11.5px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:20px 2px 11px;font-weight:800;display:flex;align-items:center;gap:9px}
.section-title::before{content:"";width:14px;height:2px;border-radius:2px;background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* glass surface mixin look */
.composer,.note,.card,.stat-card,.report,.msg.ai,.gal-item{
  background:var(--glass);border:1px solid var(--glass-brd);
  backdrop-filter:blur(12px) saturate(130%);-webkit-backdrop-filter:blur(12px) saturate(130%);
  box-shadow:var(--shadow);
}
/* composer */
.composer{border-radius:var(--radius);padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.composer::before{content:"";position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
.composer textarea{width:100%;background:transparent;border:none;color:var(--bone);font-size:15.5px;resize:none;min-height:66px;line-height:1.55;outline:none}
.composer textarea::placeholder{color:#56565e}
.fmt-bar{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0;border-top:1px solid rgba(255,255,255,.06);padding-top:11px}
.fmt-btn{padding:7px 11px;border-radius:10px;background:var(--gray2);font-size:12px;font-weight:600;color:var(--muted);transition:.2s var(--ease);border:1px solid transparent}
.fmt-btn:active{background:var(--accent);color:#000;transform:scale(.94)}
.tags-input-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
.tag-pill{background:var(--accent-soft);color:var(--accent);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;display:flex;gap:6px;align-items:center;border:1px solid color-mix(in srgb,var(--accent) 25%,transparent)}
.tag-pill b{cursor:pointer;opacity:.7}
.tags-input-wrap input{background:transparent;border:none;outline:none;color:var(--bone);font-size:13px;flex:1;min-width:90px;padding:4px}
.composer-actions{display:flex;gap:8px;align-items:center;margin-top:12px}
.toggle-master{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--muted);padding:9px 13px;border-radius:11px;background:var(--gray2);transition:.25s var(--ease);border:1px solid transparent}
.toggle-master.on{background:rgba(220,20,60,.16);color:#ff6f87;border-color:rgba(220,20,60,.4);box-shadow:0 0 18px -6px var(--crimson)}
.btn{padding:12px 17px;border-radius:13px;font-weight:700;font-size:14px;transition:.25s var(--ease);display:inline-flex;align-items:center;gap:8px;justify-content:center;letter-spacing:.2px}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 88%,#fff),var(--accent));color:#000;flex:1;box-shadow:0 8px 26px -8px var(--accent),inset 0 1px 0 rgba(255,255,255,.35)}
.btn-ghost{background:var(--glass);color:var(--bone);border:1px solid var(--glass-brd);backdrop-filter:blur(8px)}
.btn-ghost:active{background:var(--gray2)}
.btn-danger{background:rgba(220,20,60,.14);color:#ff6f87;border:1px solid rgba(220,20,60,.3)}
.mic-btn{width:48px;height:48px;border-radius:13px;background:var(--gray2);display:grid;place-items:center;font-size:18px;flex:0 0 auto;border:1px solid var(--glass-brd);transition:.25s var(--ease)}
.mic-btn.rec{background:var(--crimson);color:#fff;animation:recpulse 1.1s infinite;border-color:var(--crimson)}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(220,20,60,.55)}50%{box-shadow:0 0 0 14px rgba(220,20,60,0)}}

/* search/filter */
.searchbar{display:flex;gap:8px;margin-bottom:13px}
.searchbar input{flex:1;background:var(--glass);border:1px solid var(--glass-brd);border-radius:13px;padding:12px 15px;color:var(--bone);font-size:14px;outline:none;transition:.25s var(--ease);backdrop-filter:blur(8px)}
.searchbar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:6px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filt{flex:0 0 auto;padding:8px 13px;border-radius:20px;background:var(--glass);border:1px solid var(--glass-brd);font-size:12px;font-weight:600;color:var(--muted);transition:.25s var(--ease);backdrop-filter:blur(8px)}
.filt:active{transform:scale(.93)}
.filt.on{background:var(--accent);color:#000;border-color:transparent;font-weight:800;box-shadow:0 4px 16px -5px var(--accent)}
select.filt{appearance:none;-webkit-appearance:none}

/* notes */
.note{border-radius:var(--radius);padding:16px;margin-bottom:12px;position:relative;transition:.3s var(--ease);animation:fade .4s var(--ease)}
.note:active{transform:scale(.992)}
.note.master{border-color:rgba(220,20,60,.42);background:linear-gradient(180deg,rgba(220,20,60,.10),var(--glass));box-shadow:0 10px 40px -14px rgba(220,20,60,.5)}
.note.master::after{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--crimson);box-shadow:0 0 12px var(--crimson)}
.note.pinned::before{content:"📌";position:absolute;top:-8px;left:-6px;font-size:15px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}
.note-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:9px}
.note-date{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.note-badges{display:flex;gap:5px}
.badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:7px}
.badge.master{background:var(--crimson);color:#fff;box-shadow:0 0 14px -3px var(--crimson)}
.note-body{font-size:14.5px;line-height:1.62;color:var(--bone);word-break:break-word;overflow-wrap:anywhere}
.note-body.compact{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.note-body b{color:var(--accent);font-weight:700}
.note-body ul{margin:6px 0 6px 18px}
.note-body hr{border:none;border-top:1px solid var(--gray3);margin:9px 0}
.note-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.ntag{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:4px 9px;border-radius:14px;border:1px solid color-mix(in srgb,var(--accent) 20%,transparent)}
.note-actions{display:flex;gap:6px;margin-top:12px;border-top:1px solid rgba(255,255,255,.06);padding-top:11px;flex-wrap:wrap}
.na{font-size:12px;color:var(--muted);font-weight:600;padding:6px 10px;border-radius:9px;background:var(--gray2);display:flex;align-items:center;gap:5px;transition:.2s var(--ease)}
.na:active{background:var(--gray3);transform:scale(.93)}

/* chat */
.chat-wrap{display:flex;flex-direction:column;gap:13px}
.msg{max-width:88%;padding:13px 15px;border-radius:18px;font-size:14.5px;line-height:1.62;animation:msgin .4s var(--ease);word-break:break-word;overflow-wrap:anywhere}
@keyframes msgin{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 88%,#fff),var(--accent));color:#000;border-bottom-right-radius:6px;font-weight:500;box-shadow:0 8px 22px -10px var(--accent)}
.msg.ai{align-self:flex-start;border-bottom-left-radius:6px}
.msg.ai b{color:var(--accent)}
.msg.ai ul{margin:6px 0 6px 18px}
.msg.ai hr{border:none;border-top:1px solid var(--gray3);margin:9px 0}
.cite{display:inline-block;font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:3px 8px;border-radius:11px;margin:3px 3px 0 0;border:1px solid color-mix(in srgb,var(--accent) 22%,transparent)}
.typing{display:flex;gap:5px;padding:4px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;box-shadow:0 0 8px var(--accent)}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-input-bar{position:sticky;bottom:0;display:flex;gap:8px;padding:12px 0 4px;background:linear-gradient(0deg,var(--black) 72%,transparent)}
.chat-input-bar textarea{flex:1;background:var(--glass);border:1px solid var(--glass-brd);border-radius:15px;padding:13px 15px;color:var(--bone);font-size:14px;resize:none;max-height:120px;outline:none;line-height:1.4;backdrop-filter:blur(10px);transition:.25s var(--ease)}
.chat-input-bar textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.send-btn{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 88%,#fff),var(--accent));color:#000;display:grid;place-items:center;font-size:18px;flex:0 0 auto;box-shadow:0 8px 22px -8px var(--accent);transition:.2s var(--ease)}
.send-btn:active{transform:scale(.9)}
.send-btn:disabled{opacity:.4;box-shadow:none}

/* gallery */
.gal-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.gal-item{border-radius:16px;overflow:hidden;animation:fade .4s var(--ease);transition:.3s var(--ease)}
.gal-item:active{transform:scale(.97)}
.gal-item img{width:100%;height:144px;object-fit:cover;display:block;background:var(--gray2)}
.gal-meta{padding:10px 11px}
.gal-meta h4{font-size:13px;font-weight:700;margin-bottom:3px}
.gal-meta p{font-size:11px;color:var(--muted);line-height:1.4}
.gal-del{position:absolute;top:7px;right:7px;width:28px;height:28px;border-radius:9px;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:grid;place-items:center;font-size:12px;border:1px solid rgba(255,255,255,.12)}

/* stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.stat-card{border-radius:var(--radius);padding:17px;position:relative;overflow:hidden}
.stat-card::after{content:"";position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,var(--accent-soft),transparent 70%)}
.stat-card .num{font-size:30px;font-weight:900;line-height:1;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.stat-card .lbl{font-size:10.5px;color:var(--muted);margin-top:7px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.train-bar{height:13px;border-radius:8px;background:var(--gray2);overflow:hidden;margin-top:10px;border:1px solid rgba(255,255,255,.05)}
.train-fill{height:100%;background:linear-gradient(90deg,var(--crimson),var(--accent));border-radius:8px;transition:width 1s var(--ease);box-shadow:0 0 16px -2px var(--accent);position:relative}
.train-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmer 2.2s linear infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.week-bars{display:flex;gap:7px;align-items:flex-end;height:82px;margin-top:14px}
.week-bars .b{flex:1;background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 30%,transparent));border-radius:7px 7px 0 0;position:relative;min-height:4px;transition:height .7s var(--ease);box-shadow:0 0 14px -4px var(--accent)}
.week-bars .b .v{position:absolute;top:-16px;left:0;right:0;text-align:center;font-size:9px;color:var(--accent);font-weight:700}
.week-bars .b .d{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:9px;color:var(--muted);font-weight:600}
.tagcloud{display:flex;flex-wrap:wrap;gap:8px}
.tagcloud .tc{background:var(--gray2);padding:7px 12px;border-radius:18px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.05)}
.tagcloud .tc span{color:var(--accent);font-weight:800;margin-left:6px}

/* report */
.report{border-radius:var(--radius);padding:18px;font-size:14px;line-height:1.72;white-space:normal;animation:fade .5s var(--ease)}
.report b{color:var(--accent)}
.report h3{color:var(--accent);font-size:15px;margin:14px 0 6px}
.report ul{margin:6px 0 6px 18px}
.report hr{border:none;border-top:1px solid var(--gray3);margin:12px 0}

/* settings */
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.8px}
.field input{width:100%;background:var(--glass);border:1px solid var(--glass-brd);border-radius:13px;padding:13px 15px;color:var(--bone);font-size:14px;outline:none;transition:.25s var(--ease);backdrop-filter:blur(8px)}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.card{border-radius:var(--radius);padding:17px;margin-bottom:14px}
.card h3{font-size:14.5px;margin-bottom:4px;font-weight:700}
.card p{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:13px}
.row-btn{display:flex;gap:8px;flex-wrap:wrap}
.signin-google{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#111;font-weight:700;padding:13px;border-radius:13px;width:100%;box-shadow:0 8px 24px -10px rgba(255,255,255,.4);transition:.2s var(--ease)}
.signin-google:active{transform:scale(.97)}

/* bottom nav */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:50;
  display:flex;justify-content:space-around;align-items:center;
  padding:9px 8px calc(var(--safe-bottom) + 9px);
  background:linear-gradient(0deg,rgba(7,7,8,.96),rgba(7,7,8,.6));
  backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);
  border-top:1px solid rgba(255,255,255,.08);
}
.bottomnav::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--accent) 50%,transparent),transparent);opacity:.6}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;color:var(--muted);transition:.3s var(--ease);position:relative}
.nav-item .ic{font-size:20px;transition:.3s var(--ease);filter:grayscale(.4)}
.nav-item .tx{font-size:9.5px;font-weight:700;letter-spacing:.3px}
.nav-item.active{color:var(--accent)}
.nav-item.active .ic{transform:translateY(-3px) scale(1.12);filter:grayscale(0) drop-shadow(0 4px 8px var(--accent-soft))}
.nav-item.active::after{content:"";position:absolute;bottom:-1px;width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* modal / sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(6px);z-index:90;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex;animation:fade .25s var(--ease)}
.sheet{width:100%;max-width:560px;background:linear-gradient(180deg,rgba(28,28,32,.96),rgba(16,16,19,.98));border-radius:26px 26px 0 0;border-top:1px solid rgba(255,255,255,.12);padding:22px 18px calc(var(--safe-bottom) + 26px);animation:slideup .4s var(--ease);max-height:88dvh;overflow-y:auto;backdrop-filter:blur(24px);box-shadow:0 -20px 60px -20px rgba(0,0,0,.8)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet h2{font-size:19px;margin-bottom:4px;font-weight:800;letter-spacing:-.3px}
.sheet .sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.sheet-handle{width:42px;height:5px;border-radius:5px;background:var(--gray3);margin:0 auto 18px}
.emoji-pick{display:flex;flex-wrap:wrap;gap:9px;margin:10px 0}
.emoji-pick button{width:46px;height:46px;border-radius:13px;background:var(--gray2);font-size:21px;display:grid;place-items:center;border:1px solid transparent;transition:.25s var(--ease)}
.emoji-pick button.sel{background:var(--accent-soft);border-color:var(--accent);transform:scale(1.08);box-shadow:0 0 18px -4px var(--accent)}
.color-pick{display:flex;gap:11px;margin:10px 0}
.color-pick button{width:40px;height:40px;border-radius:50%;border:2px solid transparent;transition:.25s var(--ease)}
.color-pick button.sel{border-color:#fff;transform:scale(1.12);box-shadow:0 0 18px -2px currentColor}

.empty{text-align:center;padding:54px 20px;color:var(--muted)}
.empty .ico{font-size:50px;margin-bottom:16px;opacity:.55;filter:drop-shadow(0 8px 20px var(--accent-soft))}
.empty p{font-size:14px;line-height:1.65}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,rgba(34,34,38,.98),rgba(22,22,26,.98));color:var(--bone);padding:13px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 40px rgba(0,0,0,.6);opacity:0;transition:.35s var(--ease);pointer-events:none;max-width:90%;text-align:center;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.toast.err{border-color:rgba(220,20,60,.5);color:#ff8a9c}

.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spinner.light{border-color:rgba(255,255,255,.2);border-top-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none!important}
.fab{position:fixed;right:18px;bottom:calc(var(--safe-bottom) + 84px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 88%,#fff),var(--accent));color:#000;display:grid;place-items:center;font-size:24px;box-shadow:0 10px 30px -6px var(--accent);z-index:45}
.cloud-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--muted);padding:5px 11px;border-radius:20px;background:var(--glass);border:1px solid var(--glass-brd);backdrop-filter:blur(8px)}
.cloud-badge.on{color:#7CFC9A;border-color:rgba(124,252,154,.3)}
</style>
</head>
<body>

<canvas id="neuralBg"></canvas>

<div id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="brand"><span class="dot"></span><b>NEURAL&nbsp;BRAIN</b></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="cloudBadge" class="cloud-badge">⚪ Local</span>
        <button class="avatar" id="avatarBtn" onclick="go('settings')"><span id="avatarInit">?</span></button>
      </div>
    </div>
    <div class="brains-scroll" id="brainsScroll"></div>
  </div>

  <main id="main"></main>

  <nav class="bottomnav" id="bottomnav">
    <button class="nav-item" data-v="notes" onclick="go('notes')"><span class="ic">🗒️</span><span class="tx">Notas</span></button>
    <button class="nav-item" data-v="chat" onclick="go('chat')"><span class="ic">💬</span><span class="tx">Chat IA</span></button>
    <button class="nav-item" data-v="gallery" id="navGallery" onclick="go('gallery')"><span class="ic">🖼️</span><span class="tx">Galería</span></button>
    <button class="nav-item" data-v="stats" onclick="go('stats')"><span class="ic">📊</span><span class="tx">Stats</span></button>
    <button class="nav-item" data-v="settings" onclick="go('settings')"><span class="ic">⚙️</span><span class="tx">Ajustes</span></button>
  </nav>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   NEURAL BRAIN — Segundo Cerebro con IA
   Single-file PWA · Firebase + Anthropic
   ============================================================ */

const AI_MODEL = 'claude-sonnet-4-6';
const ACCENTS = ['#FFD700','#DC143C','#4FC3F7','#9C7BFF','#7CFC9A','#FF8A5C','#FF6FB5'];
const EMOJIS  = ['🎨','📈','🤖','🧠','💡','📚','🎯','🔥','⚡','🎵','💰','🏋️','🌱','🍳','✈️','📷','🎮','⚗️'];

/* ---------- Persistent config ---------- */
let CFG = JSON.parse(localStorage.getItem('nb_config')||'{}');
CFG.firebase = CFG.firebase||{};
function saveCfg(){ localStorage.setItem('nb_config', JSON.stringify(CFG)); }

/* ---------- App state ---------- */
let state = {
  brains: JSON.parse(localStorage.getItem('nb_brains')||'null') || defaultBrains(),
  currentBrainId: localStorage.getItem('nb_current')||null,
  view: 'notes',
  noteView: localStorage.getItem('nb_noteview')||'expanded',
  filters: { search:'', tag:null, masterOnly:false, sort:'recent' },
  composer: { tags:[], master:false, editId:null },
  user: null,
  fb: null,        // firebase namespace
  unsub: {},       // realtime listeners
  busy:false
};
if(!state.currentBrainId) state.currentBrainId = state.brains[0].id;

function defaultBrains(){
  return [
    {id:'tatuaje', name:'Tatuaje', emoji:'🎨', color:'#FFD700', builtin:true},
    {id:'trading', name:'Trading', emoji:'📈', color:'#7CFC9A', builtin:true},
    {id:'ia',      name:'IA & Tech', emoji:'🤖', color:'#4FC3F7', builtin:true},
  ];
}
function saveBrains(){ localStorage.setItem('nb_brains', JSON.stringify(state.brains)); }
function currentBrain(){ return state.brains.find(b=>b.id===state.currentBrainId)||state.brains[0]; }

/* ---------- Local data layer (localStorage = source of truth, Firestore mirror) ---------- */
const LS = {
  notes:  id=>JSON.parse(localStorage.getItem('nb_notes_'+id)||'[]'),
  chat:   id=>JSON.parse(localStorage.getItem('nb_chat_'+id)||'[]'),
  images: id=>JSON.parse(localStorage.getItem('nb_images_'+id)||'[]'),
  setNotes:(id,v)=>localStorage.setItem('nb_notes_'+id,JSON.stringify(v)),
  setChat: (id,v)=>localStorage.setItem('nb_chat_'+id,JSON.stringify(v)),
  setImages:(id,v)=>localStorage.setItem('nb_images_'+id,JSON.stringify(v)),
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function now(){ return Date.now(); }

/* ============================================================
   FIREBASE (optional, loaded on demand)
   ============================================================ */
function fbConfigured(){
  const f=CFG.firebase; return f && f.apiKey && f.projectId && f.appId;
}
function loadScript(src){
  return new Promise((res,rej)=>{
    if([...document.scripts].some(s=>s.src===src)) return res();
    const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}
async function initFirebase(){
  if(!fbConfigured()) return;
  try{
    const V='10.12.2', base='https://www.gstatic.com/firebasejs/'+V+'/';
    await loadScript(base+'firebase-app-compat.js');
    await loadScript(base+'firebase-auth-compat.js');
    await loadScript(base+'firebase-firestore-compat.js');
    await loadScript(base+'firebase-storage-compat.js');
    if(!firebase.apps.length) firebase.initializeApp(CFG.firebase);
    state.fb = firebase;
    try{ await firebase.firestore().enablePersistence({synchronizeTabs:true}); }catch(e){}
    firebase.auth().onAuthStateChanged(u=>{
      if(u){
        state.user={uid:u.uid, name:CFG.username||u.displayName||'Usuario', photo:u.photoURL};
        updateCloudBadge(true);
        attachAllListeners();
      }else{
        state.user=null; updateCloudBadge(false);
      }
      renderAvatar(); if(state.view==='settings') render();
    });
  }catch(e){ console.warn('Firebase init falló',e); toast('No se pudo cargar Firebase','err'); }
}
function updateCloudBadge(on){
  const el=document.getElementById('cloudBadge');
  el.className='cloud-badge'+(on?' on':'');
  el.textContent= on? '🟢 Sync' : (fbConfigured()?'🟡 Sin sesión':'⚪ Local');
}
async function googleSignIn(){
  if(!state.fb){ toast('Configura Firebase primero','err'); return; }
  try{ await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); toast('Sesión iniciada ✓'); }
  catch(e){ toast('Error: '+e.message,'err'); }
}
async function googleSignOut(){ if(state.fb){ await firebase.auth().signOut(); toast('Sesión cerrada'); render(); } }

function userDoc(){ return firebase.firestore().collection('users').doc(state.user.uid); }
function brainCol(bid,sub){ return userDoc().collection('brains').doc(bid).collection(sub); }

function attachAllListeners(){
  Object.values(state.unsub).forEach(fn=>{try{fn()}catch(e){}});
  state.unsub={};
  if(!state.user) return;
  state.brains.forEach(b=>{
    state.unsub['n_'+b.id]=brainCol(b.id,'notes').onSnapshot(snap=>{
      const arr=snap.docs.map(d=>d.data());
      LS.setNotes(b.id, mergeById(LS.notes(b.id),arr));
      if(state.view==='notes'&&b.id===state.currentBrainId) render();
      if(state.view==='stats'&&b.id===state.currentBrainId) render();
    },e=>{});
    state.unsub['c_'+b.id]=brainCol(b.id,'chatHistory').orderBy('ts').onSnapshot(snap=>{
      const arr=snap.docs.map(d=>d.data());
      if(arr.length) LS.setChat(b.id,arr);
      if(state.view==='chat'&&b.id===state.currentBrainId) render();
    },e=>{});
    state.unsub['i_'+b.id]=brainCol(b.id,'images').onSnapshot(snap=>{
      const arr=snap.docs.map(d=>d.data());
      LS.setImages(b.id, mergeById(LS.images(b.id),arr));
      if(state.view==='gallery'&&b.id===state.currentBrainId) render();
    },e=>{});
  });
}
function mergeById(localArr, cloudArr){
  const map={}; [...localArr,...cloudArr].forEach(x=>{
    if(!map[x.id] || (x.updatedAt||x.createdAt||0) >= (map[x.id].updatedAt||map[x.id].createdAt||0)) map[x.id]=x;
  });
  return Object.values(map);
}
async function fbSet(bid,sub,doc){ if(state.user) try{ await brainCol(bid,sub).doc(doc.id).set(doc); }catch(e){} }
async function fbDel(bid,sub,id){ if(state.user) try{ await brainCol(bid,sub).doc(id).delete(); }catch(e){} }

/* ============================================================
   ANTHROPIC API
   ============================================================ */
async function callClaude(messages, system, maxTokens=2048){
  if(!CFG.anthropicKey){ throw new Error('Falta la API Key de Anthropic (ve a Ajustes)'); }
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':CFG.anthropicKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({ model:AI_MODEL, max_tokens:maxTokens, system, messages })
  });
  if(!res.ok){
    let m='Error '+res.status; try{const j=await res.json(); m=j.error?.message||m;}catch(e){}
    throw new Error(m);
  }
  const data=await res.json();
  return (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n').trim();
}

function buildContext(brain){
  const notes = LS.notes(brain.id);
  const masters = notes.filter(n=>n.master);
  const rest = notes.filter(n=>!n.master).sort((a,b)=>b.createdAt-a.createdAt);
  let sys = `Eres el asistente del "${brain.name}" dentro de NEURAL BRAIN, el segundo cerebro personal de Víctor (Payi), tatuador neo-japonés/new school de Veracruz, México que también hace trading de crypto y crea contenido.\n\n`;
  sys += `REGLAS:\n- Responde SOLO con base en las notas de este cerebro. Si algo no está documentado, dilo claramente y sugiere documentarlo.\n- Las REGLAS MAESTRAS tienen prioridad absoluta y nunca se contradicen.\n- Cuando uses información de una nota, cítala al final entre corchetes así: [Nota: primeras palabras de la nota].\n- Sé directo, práctico y en español mexicano natural.\n\n`;
  if(masters.length){
    sys += `=== REGLAS MAESTRAS (prioridad máxima) ===\n`;
    masters.forEach((n,i)=> sys += `[M${i+1}] ${plainText(n.text)}${n.tags.length?' (tags: '+n.tags.join(', ')+')':''}\n`);
    sys += `\n`;
  }
  sys += `=== NOTAS DEL CEREBRO (${rest.length}) ===\n`;
  if(!rest.length && !masters.length) sys += '(Aún no hay notas. Invita a Víctor a empezar a documentar.)\n';
  // limit length
  let budget=14000, included=0;
  for(const n of rest){
    const line=`[#${included+1} · ${fmtDate(n.createdAt)}] ${plainText(n.text)}${n.tags.length?' (tags: '+n.tags.join(', ')+')':''}\n`;
    if(budget-line.length<0) break;
    sys+=line; budget-=line.length; included++;
  }
  if(included<rest.length) sys += `\n(...y ${rest.length-included} notas más antiguas omitidas por espacio.)\n`;
  return sys;
}

/* ============================================================
   RENDERING
   ============================================================ */
function setAccent(c){
  document.documentElement.style.setProperty('--accent',c);
  document.documentElement.style.setProperty('--accent-soft',hexA(c,.13));
  document.querySelector('meta[name=theme-color]').setAttribute('content','#070708');
  if(typeof NB!=='undefined' && NB.c) neuralAccent(c);
}
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }

function renderBrains(){
  const el=document.getElementById('brainsScroll'); el.innerHTML='';
  state.brains.forEach(b=>{
    const c=document.createElement('button');
    c.className='chip'+(b.id===state.currentBrainId?' active':'');
    if(b.id===state.currentBrainId) c.style.background=b.color;
    c.innerHTML=`<span class="e">${b.emoji}</span>${b.name}`;
    c.onclick=()=>{ state.currentBrainId=b.id; localStorage.setItem('nb_current',b.id); setAccent(b.color); render(); };
    el.appendChild(c);
  });
  const add=document.createElement('button');
  add.className='chip add'; add.innerHTML='＋ Cerebro';
  add.onclick=openNewBrain; el.appendChild(add);
}

function renderAvatar(){
  const init=document.getElementById('avatarInit');
  const name=CFG.username||(state.user&&state.user.name)||'';
  if(state.user&&state.user.photo){ document.getElementById('avatarBtn').innerHTML=`<img src="${state.user.photo}">`; }
  else init.textContent = name? name[0].toUpperCase() : '?';
}

function setNav(){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.v===state.view));
  // gallery only meaningful for tatuaje but available everywhere; keep visible
}

function go(v){ state.view=v; render(); document.getElementById('main').scrollTop=0; }

function render(){
  const b=currentBrain(); setAccent(b.color);
  renderBrains(); renderAvatar(); setNav();
  const m=document.getElementById('main');
  if(state.view==='notes')   m.innerHTML=viewNotes(b);
  else if(state.view==='chat')    m.innerHTML=viewChat(b);
  else if(state.view==='gallery') m.innerHTML=viewGallery(b);
  else if(state.view==='stats')   m.innerHTML=viewStats(b);
  else if(state.view==='settings')m.innerHTML=viewSettings();
  postRender(b);
}

/* ---------- NOTES VIEW ---------- */
function viewNotes(b){
  const tags = topTags(LS.notes(b.id));
  return `<div class="screen">
    ${composerHTML()}
    <div class="searchbar">
      <input id="searchInput" placeholder="🔍 Buscar en ${esc(b.name)}..." value="${esc(state.filters.search)}" oninput="onSearch(this.value)">
      <button class="iconbtn" onclick="toggleNoteView()" title="Vista">${state.noteView==='compact'?'🔼':'🔽'}</button>
    </div>
    <div class="filters">
      <button class="filt ${state.filters.masterOnly?'on':''}" onclick="toggleMasterFilter()">🔴 Reglas Maestras</button>
      <select class="filt" onchange="setSort(this.value)">
        <option value="recent" ${state.filters.sort==='recent'?'selected':''}>↓ Más reciente</option>
        <option value="old" ${state.filters.sort==='old'?'selected':''}>↑ Más antigua</option>
        <option value="relevance" ${state.filters.sort==='relevance'?'selected':''}>★ Relevancia</option>
      </select>
      ${tags.map(t=>`<button class="filt ${state.filters.tag===t.tag?'on':''}" onclick="toggleTagFilter('${esc(t.tag)}')">#${esc(t.tag)}</button>`).join('')}
    </div>
    <div id="notesList">${notesListHTML(b)}</div>
  </div>`;
}
function composerHTML(){
  const c=state.composer;
  return `<div class="composer">
    <textarea id="noteInput" placeholder="Captura una idea, técnica, regla o setup...">${esc(c.draft||'')}</textarea>
    <div class="fmt-bar">
      <button class="fmt-btn" onclick="wrapFmt('**','**')">𝐁 Negrita</button>
      <button class="fmt-btn" onclick="insertFmt('\\n- ')">• Lista</button>
      <button class="fmt-btn" onclick="insertFmt('\\n---\\n')">— Separador</button>
    </div>
    <div class="tags-input-wrap" id="tagsWrap">
      ${c.tags.map(t=>`<span class="tag-pill">#${esc(t)} <b onclick="removeTag('${esc(t)}')">✕</b></span>`).join('')}
      <input id="tagInput" placeholder="#tag y Enter" onkeydown="tagKey(event)">
    </div>
    <div class="composer-actions">
      <button class="toggle-master ${c.master?'on':''}" onclick="toggleComposerMaster()">${c.master?'🔴':'⚪'} Regla Maestra</button>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    </div>
    <div class="composer-actions">
      <button class="btn btn-primary" onclick="saveNote()">${c.editId?'💾 Guardar cambios':'＋ Agregar nota'}</button>
      ${c.editId?'<button class="btn btn-ghost" onclick="cancelEdit()">Cancelar</button>':''}
    </div>
  </div>`;
}
function notesListHTML(b){
  let notes=LS.notes(b.id);
  const f=state.filters;
  if(f.search){ const q=f.search.toLowerCase(); notes=notes.filter(n=>n.text.toLowerCase().includes(q)||n.tags.some(t=>t.toLowerCase().includes(q))); }
  if(f.tag) notes=notes.filter(n=>n.tags.includes(f.tag));
  if(f.masterOnly) notes=notes.filter(n=>n.master);
  notes.sort((a,b2)=>{
    if(a.pinned!==b2.pinned) return a.pinned?-1:1;
    if(f.sort==='old') return a.createdAt-b2.createdAt;
    if(f.sort==='relevance') return (score(b2))-(score(a));
    return b2.createdAt-a.createdAt;
  });
  if(!notes.length) return `<div class="empty"><div class="ico">🧠</div><p>${f.search||f.tag||f.masterOnly?'Sin resultados con esos filtros.':'Empieza a alimentar este cerebro.<br>Cada nota lo hace más inteligente.'}</p></div>`;
  return notes.map(n=>noteHTML(n)).join('');
}
function score(n){ return (n.master?100:0)+(n.pinned?50:0)+n.tags.length*5+Math.min(n.text.length/50,20); }
function noteHTML(n){
  return `<div class="note ${n.master?'master':''} ${n.pinned?'pinned':''}">
    <div class="note-head">
      <span class="note-date">🕐 ${fmtDate(n.createdAt)}${n.updatedAt&&n.updatedAt!==n.createdAt?' · editada':''}</span>
      <div class="note-badges">${n.master?'<span class="badge master">Maestra</span>':''}</div>
    </div>
    <div class="note-body ${state.noteView==='compact'?'compact':''}">${md(n.text)}</div>
    ${n.tags.length?`<div class="note-tags">${n.tags.map(t=>`<span class="ntag">#${esc(t)}</span>`).join('')}</div>`:''}
    <div class="note-actions">
      <button class="na" onclick="togglePin('${n.id}')">${n.pinned?'📌 Desfijar':'📍 Fijar'}</button>
      <button class="na" onclick="toggleMaster('${n.id}')">${n.master?'⚪ Quitar maestra':'🔴 Maestra'}</button>
      <button class="na" onclick="editNote('${n.id}')">✏️ Editar</button>
      <button class="na" onclick="delNote('${n.id}')">🗑️ Borrar</button>
    </div>
  </div>`;
}

/* ---------- CHAT VIEW ---------- */
function viewChat(b){
  const chat=LS.chat(b.id);
  return `<div class="screen" style="display:flex;flex-direction:column;min-height:calc(100dvh - 240px)">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn btn-ghost" style="flex:1" onclick="analyzeBrain()">🧬 Analizar mi cerebro</button>
      <button class="btn btn-ghost" style="flex:1" onclick="openExport()">📤 Exportar</button>
    </div>
    <div class="chat-wrap" id="chatWrap" style="flex:1">
      ${chat.length?chat.map(m=>msgHTML(m)).join(''):`<div class="empty"><div class="ico">💬</div><p>Pregúntale a tu cerebro de <b style="color:var(--accent)">${esc(b.name)}</b>.<br>Responde usando solo tus notas.</p></div>`}
    </div>
    <div class="chat-input-bar">
      <textarea id="chatInput" rows="1" placeholder="Pregunta a tu ${esc(b.name)}..." oninput="autoGrow(this)" onkeydown="chatKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendChat()">➤</button>
    </div>
  </div>`;
}
function msgHTML(m){
  if(m.role==='user') return `<div class="msg user">${esc(m.content)}</div>`;
  return `<div class="msg ai">${md(citeFmt(m.content))}</div>`;
}
function citeFmt(t){ return t.replace(/\[Nota:([^\]]+)\]/g,(_,x)=>`<<CITE>>${x.trim()}<</CITE>>`); }

/* ---------- GALLERY VIEW ---------- */
function viewGallery(b){
  const imgs=LS.images(b.id);
  return `<div class="screen">
    <div class="section-title">Galería de referencias · ${esc(b.name)}</div>

    </div>
    <div class="card">
      <h3>📅 Última nota</h3>

function onSearch(v){ state.filters.search=v; document.getElementById('notesList').innerHTML=notesListHTML(currentBrain()); }
function toggleNoteView(){ state.noteView=state.noteView==='compact'?'expanded':'compact'; localStorage.setItem('nb_noteview',state.noteView); render(); }
function toggleMasterFilter(){ state.filters.masterOnly=!state.filters.masterOnly; render(); }
function toggleTagFilter(t){ state.filters.tag=state.filters.tag===t?null:t; render(); }
function setSort(v){ state.filters.sort=v; render(); }

function tagKey(e){
  if(e.key==='Enter'||e.key===','){ e.preventDefault(); let v=e.target.value.trim().replace(/^#/,'').replace(/,/g,''); if(v&&!state.composer.tags.includes(v)){ state.composer.tags.push(v); } e.target.value=''; refreshComposerTags(); }
}
function removeTag(t){ state.composer.tags=state.composer.tags.filter(x=>x!==t); refreshComposerTags(); }
function refreshComposerTags(){
  const c=state.composer, wrap=document.getElementById('tagsWrap');
  wrap.innerHTML=c.tags.map(t=>`<span class="tag-pill">#${esc(t)} <b onclick="removeTag('${esc(t)}')">✕</b></span>`).join('')+`<input id="tagInput" placeholder="#tag y Enter" onkeydown="tagKey(event)">`;
  document.getElementById('tagInput').focus();
}
function toggleComposerMaster(){ state.composer.master=!state.composer.master; saveDraft(); render(); restoreFocus(); }
function wrapFmt(a,b){ const t=document.getElementById('noteInput'); const s=t.selectionStart,e=t.selectionEnd; t.value=t.value.slice(0,s)+a+t.value.slice(s,e)+b+t.value.slice(e); t.focus(); t.selectionStart=s+a.length; t.selectionEnd=e+a.length; }
function insertFmt(x){ const t=document.getElementById('noteInput'); const s=t.selectionStart; const ins=x.replace(/\\n/g,'\n'); t.value=t.value.slice(0,s)+ins+t.value.slice(s); t.focus(); t.selectionStart=t.selectionEnd=s+ins.length; }
function saveDraft(){ const t=document.getElementById('noteInput'); if(t) state.composer.draft=t.value; }
function restoreFocus(){ const t=document.getElementById('noteInput'); if(t) t.focus(); }

function saveNote(){
  const t=document.getElementById('noteInput'); const text=t.value.trim();
  if(!text){ toast('Escribe algo primero','err'); return; }
  const bid=state.currentBrainId; let notes=LS.notes(bid); const c=state.composer;
  if(c.editId){
    const n=notes.find(x=>x.id===c.editId);
    if(n){ n.text=text; n.tags=[...c.tags]; n.master=c.master; n.updatedAt=now(); fbSet(bid,'notes',n); }
    toast('Nota actualizada ✓');
  }else{
    const n={id:uid(),text,tags:[...c.tags],master:c.master,pinned:false,createdAt:now(),updatedAt:now()};
    notes.unshift(n); fbSet(bid,'notes',n); toast('Nota guardada ✓');
  }
  LS.setNotes(bid,notes);
  state.composer={tags:[],master:false,editId:null,draft:''};
  render();
}
function editNote(id){
  const n=LS.notes(state.currentBrainId).find(x=>x.id===id); if(!n) return;
  state.composer={editId:id,tags:[...n.tags],master:n.master,draft:n.text};
  render(); document.getElementById('main').scrollTop=0; document.getElementById('noteInput').focus();
}
function cancelEdit(){ state.composer={tags:[],master:false,editId:null,draft:''}; render(); }
function delNote(id){
  confirmSheet('¿Borrar esta nota?','Esta acción no se puede deshacer.',()=>{
    const bid=state.currentBrainId; let notes=LS.notes(bid).filter(n=>n.id!==id);
    LS.setNotes(bid,notes); fbDel(bid,'notes',id); toast('Nota borrada'); render();
  });
}
function togglePin(id){ const bid=state.currentBrainId; let notes=LS.notes(bid); const n=notes.find(x=>x.id===id); if(n){ n.pinned=!n.pinned; n.updatedAt=now(); LS.setNotes(bid,notes); fbSet(bid,'notes',n);} render(); }
function toggleMaster(id){ const bid=state.currentBrainId; let notes=LS.notes(bid); const n=notes.find(x=>x.id===id); if(n){ n.master=!n.master; n.updatedAt=now(); LS.setNotes(bid,notes); fbSet(bid,'notes',n);} render(); }

/* ============================================================
   VOICE TO NOTE
   ============================================================ */
let recog=null, recActive=false;
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast('Tu navegador no soporta dictado por voz','err'); return; }
  if(recActive){ recog.stop(); return; }
  recog=new SR(); recog.lang='es-MX'; recog.continuous=true; recog.interimResults=true;
  let base=document.getElementById('noteInput').value;
  recog.onstart=()=>{ recActive=true; document.getElementById('micBtn').classList.add('rec'); toast('🎤 Escuchando...'); };
  recog.onresult=e=>{
    let txt=''; for(let i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript;
    document.getElementById('noteInput').value=(base?base+' ':'')+txt;
  };
  recog.onerror=e=>{ toast('Error de voz: '+e.error,'err'); };
  recog.onend=()=>{ recActive=false; const mb=document.getElementById('micBtn'); if(mb)mb.classList.remove('rec'); };
  recog.start();
}

/* ============================================================
   CHAT
   ============================================================ */
function autoGrow(t){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,120)+'px'; }
function chatKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); } }
async function sendChat(){
  if(state.busy) return;
  const inp=document.getElementById('chatInput'); const q=inp.value.trim(); if(!q) return;
  const b=currentBrain(); let chat=LS.chat(b.id);
  const userMsg={id:uid(),role:'user',content:q,ts:now()};
  chat.push(userMsg); LS.setChat(b.id,chat); fbSet(b.id,'chatHistory',userMsg);
  inp.value=''; autoGrow(inp);
  const wrap=document.getElementById('chatWrap');
  // remove empty placeholder
  if(wrap.querySelector('.empty')) wrap.innerHTML='';
  wrap.insertAdjacentHTML('beforeend',msgHTML(userMsg));
  wrap.insertAdjacentHTML('beforeend',`<div class="msg ai" id="typing"><div class="typing"><span></span><span></span><span></span></div></div>`);
  document.getElementById('main').scrollTop=999999;
  state.busy=true; document.getElementById('sendBtn').disabled=true;
  try{
    const history=chat.slice(-12).map(m=>({role:m.role,content:m.content}));
    const ans=await callClaude(history, buildContext(b));
    const aiMsg={id:uid(),role:'assistant',content:ans,ts:now()};
    chat.push(aiMsg); LS.setChat(b.id,chat); fbSet(b.id,'chatHistory',aiMsg);
  }catch(e){
    const aiMsg={id:uid(),role:'assistant',content:'⚠️ '+e.message,ts:now()};
    chat.push(aiMsg); LS.setChat(b.id,chat);
  }
  state.busy=false; const sb=document.getElementById('sendBtn'); if(sb)sb.disabled=false;
  render();
}
function clearChat(){
  confirmSheet('¿Borrar el historial de chat?','Solo del cerebro actual. Las notas no se tocan.',async()=>{
    const bid=state.currentBrainId; LS.setChat(bid,[]);
    if(state.user){ try{ const snap=await brainCol(bid,'chatHistory').get(); snap.forEach(d=>d.ref.delete()); }catch(e){} }
    toast('Chat borrado'); go('chat');
  });
}

function openPrintPDF(b, content){

function download(name,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}
function exportRaw(fmt){
  const b=currentBrain(); const notes=LS.notes(b.id);
  if(fmt==='json'){ download(`neural-brain-${b.id}.json`, JSON.stringify(notes,null,2),'application/json'); }
  else{
    let txt=`NEURAL BRAIN — ${b.name}\n${'='.repeat(40)}\n\n`;
    notes.forEach(n=>{ txt+=`[${fmtDate(n.createdAt)}]${n.master?' ★REGLA MAESTRA':''}${n.pinned?' 📌':''}\n${plainText(n.text)}\n${n.tags.length?'Tags: '+n.tags.map(t=>'#'+t).join(' ')+'\n':''}\n${'-'.repeat(30)}\n\n`; });
    download(`neural-brain-${b.id}.txt`, txt,'text/plain');
  }
  closeSheet(); toast('Exportado ✓');
}
function backupAll(){
  const dump={ exportedAt:new Date().toISOString(), username:CFG.username, brains:state.brains, data:{} };
  state.brains.forEach(b=>{ dump.data[b.id]={notes:LS.notes(b.id),chat:LS.chat(b.id),images:LS.images(b.id)}; });
  download('neural-brain-backup.json', JSON.stringify(dump,null,2),'application/json');
  closeSheet(); toast('Respaldo completo descargado ✓');
}

async function uploadImage(){
  const file=document.getElementById('imgFile').files[0];
  if(!file){ toast('Selecciona una imagen','err'); return; }
  const title=document.getElementById('imgTitle').value.trim();
  const desc=document.getElementById('imgDesc').value.trim();
  const btn=document.getElementById('upBtn'); btn.innerHTML='<span class="spinner"></span> Subiendo...'; btn.disabled=true;
  const bid=state.currentBrainId; const id=uid();
  try{
    let url;
    if(state.user && state.fb){
      const ref=firebase.storage().ref(`users/${state.user.uid}/brains/${bid}/${id}`);
      await ref.put(file); url=await ref.getDownloadURL();
    }else{
      url=await fileToDataURL(file); // local fallback
    }
    const img={id,title,desc,url,createdAt:now()};
    const imgs=LS.images(bid); imgs.unshift(img); LS.setImages(bid,imgs);
    fbSet(bid,'images',{id,title,desc,url,createdAt:img.createdAt});
    closeSheet(); toast('Referencia subida ✓'); render();
  }catch(e){ toast('Error: '+e.message,'err'); btn.innerHTML='Subir'; btn.disabled=false; }
}
function fileToDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }

function openSheet(html){ const o=document.getElementById('overlay'); document.getElementById('sheet').innerHTML=html; o.classList.add('show'); }

function confirmSheet(title,sub,onYes){
  openSheet(`<div class="sheet-handle"></div><h2>${esc(title)}</h2><p class="sub">${esc(sub)}</p>
    <div style="display:flex;gap:10px">

let toastT;
function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type==='err'?' err':''); clearTimeout(toastT); toastT=setTimeout(()=>t.className='toast',2600); }

/* ============================================================
   HELPERS
   ============================================================ */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function plainText(s){ return String(s).replace(/\*\*/g,'').replace(/\n+/g,' ').trim(); }
function md(s){
  let h=esc(s);
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  h=h.replace(/^\s*[-*]\s+(.*)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>[\s\S]*?<\/li>)/g,m=>'<ul>'+m+'</ul>');
  h=h.replace(/<\/ul>\s*<ul>/g,'');
  h=h.replace(/^\s*---\s*$/gm,'<hr>');
  h=h.replace(/\n/g,'<br>');
  h=h.replace(/<br>(<\/?(ul|li|hr))/g,'$1').replace(/(<\/(ul|li|hr)>)<br>/g,'$1');
  return h;
}
function fmtDate(ts){ const d=new Date(ts); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' · '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); }
function timeAgo(ts){ const s=(now()-ts)/1000; if(s<60)return'hace un momento'; if(s<3600)return'hace '+Math.floor(s/60)+' min'; if(s<86400)return'hace '+Math.floor(s/3600)+' h'; return'hace '+Math.floor(s/86400)+' días'; }
function topTags(notes){ const m={}; notes.forEach(n=>n.tags.forEach(t=>m[t]=(m[t]||0)+1)); return Object.entries(m).map(([tag,count])=>({tag,count})).sort((a,b)=>b.count-a.count).slice(0,8); }
function weekActivity(notes){
  const out=[]; const today=new Date(); today.setHours(0,0,0,0);
  for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); const start=d.getTime(),end=start+86400000;
    out.push({day:d.getDay(),c:notes.filter(n=>n.createdAt>=start&&n.createdAt<end).length}); }
  return out;
}

/* ============================================================
   PWA: manifest + service worker (inline)
   ============================================================ */
function installPWA(){
  const icon="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'><rect width='512' height='512' rx='110' fill='#0A0A0A'/><text x='50%' y='54%' font-size='300' text-anchor='middle' dominant-baseline='middle'>🧠</text></svg>`);
  const manifest={ name:'NEURAL BRAIN', short_name:'NEURAL BRAIN', description:'Tu segundo cerebro con IA',
    start_url:'.', display:'standalone', background_color:'#0A0A0A', theme_color:'#0A0A0A', orientation:'portrait',
    icons:[{src:icon,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'},{src:icon,sizes:'192x192',type:'image/svg+xml'}] };
  const mb=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(mb); document.head.appendChild(link);
  const apple=document.createElement('link'); apple.rel='apple-touch-icon'; apple.href=icon; document.head.appendChild(apple);
  // Service worker (offline cache of this document). Works when served over http(s).
  if('serviceWorker' in navigator && location.protocol.startsWith('http')){
    const sw=`const C='neural-brain-v1';self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open(C).then(async c=>{const r=await c.match(e.request);const f=fetch(e.request).then(res=>{if(res&&res.status===200)c.put(e.request,res.clone());return res}).catch(()=>r);return r||f}))});`;
    const swUrl=URL.createObjectURL(new Blob([sw],{type:'text/javascript'}));
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
}

/* ============================================================
   NEURAL BACKGROUND (animated network)
   ============================================================ */
let NB={c:null,ctx:null,nodes:[],raf:null,accent:'#FFD700',w:0,h:0,dpr:1};
function neuralInit(){
  NB.c=document.getElementById('neuralBg'); if(!NB.c) return;
  NB.ctx=NB.c.getContext('2d');
  neuralResize();
  window.addEventListener('resize',neuralResize);
  // build nodes (scaled to viewport, capped for mobile perf)
  const count=Math.min(46,Math.max(22,Math.round(window.innerWidth*window.innerHeight/26000)));
  NB.nodes=[];
  for(let i=0;i<count;i++){
    NB.nodes.push({
      x:rnd()*NB.w, y:rnd()*NB.h,
      vx:(rnd()-.5)*0.22, vy:(rnd()-.5)*0.22,
      r:rnd()*1.6+0.8, pulse:rnd()*Math.PI*2
    });
  }
  cancelAnimationFrame(NB.raf);
  neuralLoop();
}
function rnd(){ // local PRNG (Math.random allowed at runtime in app, but keep deterministic-ish spread)
  return Math.random();
}
function neuralResize(){
  if(!NB.c) return;
  NB.dpr=Math.min(window.devicePixelRatio||1,2);
  NB.w=window.innerWidth; NB.h=window.innerHeight;
  NB.c.width=NB.w*NB.dpr; NB.c.height=NB.h*NB.dpr;
  NB.c.style.width=NB.w+'px'; NB.c.style.height=NB.h+'px';
  NB.ctx.setTransform(NB.dpr,0,0,NB.dpr,0,0);
}
function hexRGB(hex){ const n=parseInt(hex.replace('#',''),16); return [n>>16&255,n>>8&255,n&255]; }
function neuralLoop(){
  const {ctx,w,h,nodes}=NB; if(!ctx){return;}
  ctx.clearRect(0,0,w,h);
  const [r,g,b]=hexRGB(NB.accent);
  const LINK=120;
  for(const n of nodes){
    n.x+=n.vx; n.y+=n.vy; n.pulse+=0.02;
    if(n.x<0||n.x>w) n.vx*=-1;
    if(n.y<0||n.y>h) n.vy*=-1;
  }
  // links
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b2=nodes[j];
      const dx=a.x-b2.x, dy=a.y-b2.y, d=Math.hypot(dx,dy);
      if(d<LINK){
        const o=(1-d/LINK)*0.5;
        ctx.strokeStyle=`rgba(${r},${g},${b},${o})`;
        ctx.lineWidth=0.6;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b2.x,b2.y); ctx.stroke();
      }
    }
  }
  // nodes
  for(const n of nodes){
    const glow=0.5+Math.sin(n.pulse)*0.35;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${r},${g},${b},${0.45+glow*0.4})`;
    ctx.shadowColor=`rgba(${r},${g},${b},0.9)`; ctx.shadowBlur=8*glow;
    ctx.fill(); ctx.shadowBlur=0;
  }
  NB.raf=requestAnimationFrame(neuralLoop);
}
function neuralAccent(c){ NB.accent=c; }
